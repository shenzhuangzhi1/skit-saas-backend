name: skit-saas

services:
  mysql:
    image: mysql:8
    container_name: skit-saas-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-skit_saas}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init/ruoyi-vue-pro.sql:/docker-entrypoint-initdb.d/01-ruoyi-vue-pro.sql:ro
      - ./mysql/init/skit-saas.sql:/docker-entrypoint-initdb.d/02-skit-saas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:6.2-alpine
    container_name: skit-saas-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    image: ${BACKEND_IMAGE:-skit-saas-backend}:${BACKEND_IMAGE_TAG:-latest}
    container_name: skit-saas-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_PORT:-48080}:48080"
    volumes:
      - ./ad-keyring.properties:/run/secrets/skit-ad-keyring.properties:ro
    environment:
      # runtime contains only production connectivity; prod applies the fail-closed security policy.
      SPRING_PROFILES_ACTIVE: "runtime,prod"
      SPRING_CONFIG_IMPORT: "optional:file:/run/secrets/skit-ad-keyring.properties"
      MYSQL_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-skit_saas}
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      YUDAO_API_ENCRYPT_ENABLED: ${YUDAO_API_ENCRYPT_ENABLED:-false}
      YUDAO_API_ENCRYPT_REQUEST_KEY: ${YUDAO_API_ENCRYPT_REQUEST_KEY:-}
      YUDAO_API_ENCRYPT_RESPONSE_KEY: ${YUDAO_API_ENCRYPT_RESPONSE_KEY:-}
      SKIT_AD_ENCRYPTION_KEY: ${SKIT_AD_ENCRYPTION_KEY:?SKIT_AD_ENCRYPTION_KEY is required}
      SKIT_AD_CREDENTIAL_KEY: ${SKIT_AD_CREDENTIAL_KEY:?SKIT_AD_CREDENTIAL_KEY is required}
      SKIT_AD_CREDENTIAL_KEY_ID: ${SKIT_AD_CREDENTIAL_KEY_ID:-primary}
      SKIT_AD_SESSION_TOKEN_KEY: ${SKIT_AD_SESSION_TOKEN_KEY:?SKIT_AD_SESSION_TOKEN_KEY is required}
      SKIT_AD_SESSION_TOKEN_KEY_VERSION: ${SKIT_AD_SESSION_TOKEN_KEY_VERSION:-1}
      SKIT_AD_CALLBACK_PUBLIC_BASE_URL: ${SKIT_AD_CALLBACK_PUBLIC_BASE_URL:?SKIT_AD_CALLBACK_PUBLIC_BASE_URL is required}
      # Only the immediate Docker reverse proxy may supply the overwritten X-Real-IP value.
      SKIT_TRUSTED_PROXY_CIDRS: ${SKIT_TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx512m -Djava.security.egd=file:/dev/./urandom}

  frontend:
    image: ${FRONTEND_IMAGE:-skit-saas-frontend}:${FRONTEND_IMAGE_TAG:-latest}
    container_name: skit-saas-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mysql_data:
  redis_data:
