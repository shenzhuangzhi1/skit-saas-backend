name: skit-saas-local

services:
  mysql:
    image: mysql:8
    container_name: skit-saas-local-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ruoyi-vue-pro-jdk8}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - skit-saas-local-mysql:/var/lib/mysql
      - ../sql/mysql/ruoyi-vue-pro.sql:/docker-entrypoint-initdb.d/01-ruoyi-vue-pro.sql:ro
      - ../sql/mysql/skit-saas.sql:/docker-entrypoint-initdb.d/02-skit-saas.sql:ro
      - ../sql/mysql/quartz.sql:/docker-entrypoint-initdb.d/03-quartz.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 24

  redis:
    image: redis:6.2-alpine
    container_name: skit-saas-local-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - skit-saas-local-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 24

volumes:
  skit-saas-local-mysql:
  skit-saas-local-redis:
