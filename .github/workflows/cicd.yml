name: Backend CI/CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: skit-saas-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/skit-saas-backend
  IMAGE_TAG: ${{ github.sha }}
  RELEASE_ID: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  runtime-diagnostic:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/codex/callback-rotation-diagnostic'
    name: Read callback rotation diagnostics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?Set SERVER_HOST secret}"
          AUTH_VALUE="${SERVER_SSH_KEY:-${SERVER_PASSWORD:-}}"
          : "${AUTH_VALUE:?Set SERVER_SSH_KEY or SERVER_PASSWORD secret}"
          SERVER_PORT="${SERVER_PORT:-22}"
          install -m 700 -d ~/.ssh
          KEY_FILE="$HOME/.ssh/skit_diagnostic_key"
          if printf '%s' "${AUTH_VALUE}" | grep -q -- '-----BEGIN .*PRIVATE KEY-----'; then
            printf '%s' "${AUTH_VALUE}" | perl -0pe 's/\\n/\n/g; s/\r\n?/\n/g; s/\n?$/\n/' > "${KEY_FILE}"
            chmod 600 "${KEY_FILE}"
            printf 'SKIT_AUTH_MODE=key\n' > /tmp/skit-diagnostic-auth.env
          else
            sudo apt-get update >/dev/null
            sudo apt-get install -y sshpass >/dev/null
            {
              printf 'SKIT_AUTH_MODE=password\n'
              printf 'SKIT_SSH_PASSWORD=%q\n' "${AUTH_VALUE}"
            } > /tmp/skit-diagnostic-auth.env
          fi
          chmod 600 /tmp/skit-diagnostic-auth.env
          install -m 600 deploy/known_hosts ~/.ssh/known_hosts
          ssh-keygen -F "${SERVER_HOST}" -f ~/.ssh/known_hosts >/dev/null

      - name: Query callback rotation failure
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SERVER_SUDO_PASSWORD: ${{ secrets.SERVER_SUDO_PASSWORD }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . /tmp/skit-diagnostic-auth.env
          SERVER_PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-skit-saas}"
          SUDO_PASSWORD="${SERVER_SUDO_PASSWORD:-${SERVER_PASSWORD:-}}"
          SSH_OPTIONS=(-o StrictHostKeyChecking=yes -o ConnectTimeout=30 -p "${SERVER_PORT}")
          if [ "${SKIT_AUTH_MODE}" = "password" ]; then
            SSH=(env SSHPASS="${SKIT_SSH_PASSWORD}" sshpass -e ssh "${SSH_OPTIONS[@]}" -o PreferredAuthentications=password,keyboard-interactive -o PubkeyAuthentication=no)
            SCP=(env SSHPASS="${SKIT_SSH_PASSWORD}" sshpass -e scp -o StrictHostKeyChecking=yes -P "${SERVER_PORT}" -o PreferredAuthentications=password,keyboard-interactive -o PubkeyAuthentication=no)
          else
            SSH=(ssh "${SSH_OPTIONS[@]}" -i "$HOME/.ssh/skit_diagnostic_key")
            SCP=(scp -o StrictHostKeyChecking=yes -P "${SERVER_PORT}" -i "$HOME/.ssh/skit_diagnostic_key")
          fi
          printf -v DEPLOY_PATH_Q '%q' "${DEPLOY_PATH}"
          diagnostic_env="/tmp/skit-callback-diagnostic-${GITHUB_RUN_ID}.env"
          remote_env_name=".callback-diagnostic-${GITHUB_RUN_ID}.env"
          trap 'rm -f "${diagnostic_env}"' EXIT
          printf 'SUDO_PASSWORD=%q\n' "${SUDO_PASSWORD}" > "${diagnostic_env}"
          chmod 600 "${diagnostic_env}"
          "${SSH[@]}" "${SERVER_USER}@${SERVER_HOST}" \
            "find '${DEPLOY_PATH}' -maxdepth 1 -type f -name '.callback-diagnostic-*.env' -delete; umask 077; touch '${DEPLOY_PATH}/${remote_env_name}'; chmod 600 '${DEPLOY_PATH}/${remote_env_name}'"
          "${SCP[@]}" "${diagnostic_env}" \
            "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/${remote_env_name}"
          "${SSH[@]}" "${SERVER_USER}@${SERVER_HOST}" \
            "DEPLOY_PATH=${DEPLOY_PATH_Q} DIAGNOSTIC_ENV_NAME=${remote_env_name} bash -s" <<'REMOTE'
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          diagnostic_env="${DIAGNOSTIC_ENV_NAME}"
          cleanup() {
            if [ "${history_long_restore:-}" = "YES" ] && declare -F run_docker >/dev/null 2>&1; then
              run_docker exec -e MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" skit-saas-mysql \
                mysql --batch --raw -uroot -e \
                "UPDATE performance_schema.setup_consumers SET ENABLED='NO' WHERE NAME='events_statements_history_long'" \
                >/dev/null 2>&1 || true
            fi
            rm -f -- "${diagnostic_env}"
          }
          trap cleanup EXIT HUP INT TERM
          if [ -L "${diagnostic_env}" ] || [ ! -f "${diagnostic_env}" ]; then
            echo "Runtime diagnostic environment file is missing or unsafe."
            exit 1
          fi
          # shellcheck disable=SC1090
          . "${diagnostic_env}"
          rm -f -- "${diagnostic_env}"
          set -a
          # shellcheck disable=SC1091
          . ./.env
          set +a
          docker_cmd=(docker)
          if ! docker version >/dev/null 2>&1; then
            if sudo -n docker version >/dev/null 2>&1; then
              docker_cmd=(sudo -n docker)
            else
              docker_cmd=(sudo -S -p '' docker)
            fi
          fi
          run_docker() {
            if [ "${docker_cmd[0]}" = "sudo" ] && [ "${docker_cmd[1]}" = "-S" ]; then
              printf '%s\n' "${SUDO_PASSWORD}" | "${docker_cmd[@]}" "$@"
            else
              "${docker_cmd[@]}" "$@"
            fi
          }
          database="${MYSQL_DATABASE:-skit_saas}"
          history_long_original="$(run_docker exec -e MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" skit-saas-mysql \
            mysql --batch --raw --skip-column-names -uroot -e \
            "SELECT ENABLED FROM performance_schema.setup_consumers WHERE NAME='events_statements_history_long'")"
          if [ "${history_long_original}" != "YES" ]; then
            run_docker exec -e MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" skit-saas-mysql \
              mysql --batch --raw -uroot -e \
              "UPDATE performance_schema.setup_consumers SET ENABLED='YES' WHERE NAME='events_statements_history_long'"
            history_long_restore="YES"
          fi
          echo "Statement capture window is open"
          sleep 30
          sql="SELECT id, exception_time, exception_name, exception_message, exception_root_cause_message, exception_class_name, exception_method_name, exception_line_number FROM infra_api_error_log WHERE request_url LIKE '%/skit/tenant/ad-readiness/callback-key/rotate%' ORDER BY id DESC LIMIT 5"
          run_docker exec -e MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" skit-saas-mysql \
            mysql --batch --raw -uroot "${database}" -e "${sql}"
          stack_sql="SELECT id, LEFT(exception_stack_trace,12000) AS exception_stack_trace FROM infra_api_error_log WHERE request_url LIKE '%/skit/tenant/ad-readiness/callback-key/rotate%' ORDER BY id DESC LIMIT 1"
          run_docker exec -e MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" skit-saas-mysql \
            mysql --batch --raw -uroot "${database}" -e "${stack_sql}"
          trace_id="$(run_docker exec -e MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" skit-saas-mysql \
            mysql --batch --raw --skip-column-names -uroot "${database}" -e \
            "SELECT trace_id FROM infra_api_error_log WHERE request_url LIKE '%/skit/tenant/ad-readiness/callback-key/rotate%' ORDER BY id DESC LIMIT 1")"
          if [ -n "${trace_id}" ]; then
            run_docker logs --since 2h --tail 10000 skit-saas-backend 2>&1 \
              | grep -F -A 140 -B 20 -- "${trace_id}" \
              | grep -E 'rotateCallbackKey|sqlState|errorCode|SQLException|Exception|Caused by|skit_ad_callback_key|constraint|Column|Duplicate|cn\\.iocoder|org\\.mybatis' \
              | tail -n 240 || true
          fi
          run_docker logs --since 2h --tail 20000 skit-saas-backend 2>&1 \
            | grep -E 'rotateCallbackKey|sqlState|errorCode|DataIntegrityViolationException|SQLException|SQLIntegrity|Error updating database|skit_ad_callback_key|constraint|Column|Duplicate' \
            | tail -n 240 || true
          performance_sql="SELECT EVENT_ID,CURRENT_SCHEMA,MYSQL_ERRNO,RETURNED_SQLSTATE,MESSAGE_TEXT,LEFT(SQL_TEXT,1000) AS SQL_TEXT,LEFT(DIGEST_TEXT,1000) AS DIGEST_TEXT FROM performance_schema.events_statements_history_long WHERE MYSQL_ERRNO<>0 ORDER BY EVENT_ID DESC LIMIT 100"
          run_docker exec -e MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" skit-saas-mysql \
            mysql --batch --raw -uroot -e "${performance_sql}"
          run_docker exec -e MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" skit-saas-mysql \
            mysql --batch --raw -uroot -e \
            "SELECT NAME,ENABLED FROM performance_schema.setup_consumers WHERE NAME LIKE 'events_statements_history%'"
          run_docker exec -e MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" skit-saas-mysql \
            mysql --batch --raw -uroot "${database}" -e \
            "SHOW CREATE TABLE skit_ad_callback_key; SHOW CREATE TABLE skit_management_command_audit; SHOW TRIGGERS LIKE 'skit_ad_callback_key'; SHOW TRIGGERS LIKE 'skit_management_command_audit'"
          run_docker exec -e MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" skit-saas-mysql \
            mysql --batch --raw -uroot -e \
            "SELECT TABLE_NAME,COLUMN_NAME,COLUMN_TYPE,IS_NULLABLE,COLUMN_DEFAULT,EXTRA FROM information_schema.COLUMNS WHERE TABLE_SCHEMA='${database}' AND TABLE_NAME IN ('skit_ad_callback_key','skit_management_command_audit') ORDER BY TABLE_NAME,ORDINAL_POSITION"
          run_docker exec -e MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" skit-saas-mysql \
            mysql --batch --raw -uroot "${database}" -e \
            "SELECT id,tenant_id,ad_account_id,key_version,active,accept_until,revoked_at FROM skit_ad_callback_key WHERE tenant_id=162 ORDER BY id"
          REMOTE

  unit-tests:
    if: github.ref == 'refs/heads/master'
    name: Backend unit and security checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "8"
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Verify deployment security contracts
        run: |
          ./deploy/test-compose-topology.sh
          ./deploy/test-encryption-key.sh
          ./deploy/test-activation-encryption-key.sh
          ./deploy/test-activation-health.sh
          ./deploy/test-release-security.sh

      - name: Run focused tenant lifecycle tests
        run: >-
          mvn -B -pl yudao-module-skit,yudao-module-system,yudao-module-infra -am
          -Dtest='Skit*Test,Taku*Test,*SecurityTest,SystemPlatformAdminGuardTest,TenantVisitContextInterceptorTest,AdminAuthServiceImplTest,OAuth2TokenServiceImplTest,OAuth2TokenServiceScopedRevocationTest,TenantPackageControllerTest,TenantPackageServiceImplTest,AdminUserServiceImplTest,SpringUtilsTest,AdminServerConfigurationTest,ApiAccessLogInterceptorTest,*SecretRedactionTest'
          -Dsurefire.failIfNoSpecifiedTests=false test

  mysql-integration:
    if: github.ref == 'refs/heads/master'
    name: Backend MySQL 8 integration checks
    runs-on: ubuntu-latest

    # GitHub-hosted runners do not expose the Docker bridge network to the
    # Testcontainers JVM consistently. Ryuk can therefore be started but is
    # unreachable from the test process, causing every integration class to
    # wait for the same 30-second retry loop and eventually fail. The runner
    # is ephemeral, so disabling Ryuk here is safe; containers disappear with
    # the runner after this job.
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "8"
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Verify Skit migrations against MySQL 8
        run: >-
          mvn -B -pl yudao-module-skit -am
          -Dtest=__NoSurefireTests__
          -Dit.test='Skit*MySqlIT'
          -Dsurefire.failIfNoSpecifiedTests=false
          -Dfailsafe.failIfNoSpecifiedTests=false
          test-compile failsafe:integration-test failsafe:verify

  build-and-deploy:
    needs:
      - unit-tests
      - mysql-integration
    if: github.ref == 'refs/heads/master'
    name: Build and deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "8"
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Build server jar
        run: mvn -B -pl yudao-server -am -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          set -euo pipefail
          docker buildx build \
            --label app=skit-saas-backend \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            -t "${IMAGE_NAME}:${IMAGE_TAG}" \
            --load \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            yudao-server

      - name: Verify packaged production startup
        run: |
          chmod +x deploy/test-production-image-startup.sh
          IMAGE_NAME="${IMAGE_NAME}" IMAGE_TAG="${IMAGE_TAG}" \
            ./deploy/test-production-image-startup.sh

      - name: Login to GHCR
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          set -euo pipefail
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Prepare deployment files
        run: |
          set -euo pipefail
          mkdir -p .deploy
          cp deploy/docker-compose.prod.yml .deploy/docker-compose.prod.yml
          cp deploy/activate-backend.sh .deploy/activate-backend.sh
          cp deploy/cleanup-backend-release-env.sh .deploy/cleanup-backend-release-env.sh
          cp sql/mysql/ruoyi-vue-pro.sql .deploy/ruoyi-vue-pro.sql
          cp sql/mysql/skit-saas.sql .deploy/skit-saas.sql
          cp sql/mysql/quartz.sql .deploy/quartz.sql

      - name: Detect deployment secrets
        id: deploy_config
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          if [ -n "${SERVER_HOST}" ] && [ -n "${SERVER_USER}" ] && { [ -n "${SERVER_SSH_KEY}" ] || [ -n "${SERVER_PASSWORD}" ]; }; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::notice::Deployment skipped because SERVER_HOST, SERVER_USER, and one of SERVER_SSH_KEY or SERVER_PASSWORD are not configured."
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Prepare SSH
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?Set SERVER_HOST secret}"
          AUTH_VALUE="${SERVER_SSH_KEY:-${SERVER_PASSWORD:-}}"
          : "${AUTH_VALUE:?Set SERVER_SSH_KEY or SERVER_PASSWORD secret}"
          SERVER_PORT="${SERVER_PORT:-22}"
          install -m 700 -d ~/.ssh
          KEY_FILE="$HOME/.ssh/skit_deploy_key"
          if printf '%s' "${AUTH_VALUE}" | grep -q -- '-----BEGIN .*PRIVATE KEY-----'; then
            printf '%s' "${AUTH_VALUE}" | perl -0pe 's/\\n/\n/g; s/\r\n?/\n/g; s/\n?$/\n/' > "${KEY_FILE}"
            chmod 600 "${KEY_FILE}"
            if ! ssh-keygen -y -P "" -f "${KEY_FILE}" >/dev/null; then
              echo "::error::SERVER_SSH_KEY looks like a private key, but it is not readable. Use an unencrypted private key or set SERVER_PASSWORD instead."
              exit 1
            fi
            printf 'SKIT_AUTH_MODE=key\n' > .deploy/ssh-auth.env
          else
            if printf '%s' "${AUTH_VALUE}" | tr -d '\r\n ' | base64 -d > "${KEY_FILE}" 2>/tmp/skit_key_decode_error \
              && chmod 600 "${KEY_FILE}" \
              && ssh-keygen -y -P "" -f "${KEY_FILE}" >/dev/null 2>&1; then
              printf 'SKIT_AUTH_MODE=key\n' > .deploy/ssh-auth.env
            else
              sudo apt-get update
              sudo apt-get install -y sshpass
              {
                printf 'SKIT_AUTH_MODE=password\n'
                printf 'SKIT_SSH_PASSWORD=%q\n' "${AUTH_VALUE}"
              } > .deploy/ssh-auth.env
            fi
          fi
          chmod 600 .deploy/ssh-auth.env
          cat > .deploy/ssh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          # shellcheck disable=SC1091
          . "$(dirname "$0")/ssh-auth.env"
          SERVER_PORT="${SERVER_PORT:-22}"
          SSH_OPTIONS=(
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=60
            -o TCPKeepAlive=yes
            -o ConnectTimeout=30
          )
          if [ "${SKIT_AUTH_MODE}" = "password" ]; then
            SSHPASS="${SKIT_SSH_PASSWORD}" sshpass -e ssh "${SSH_OPTIONS[@]}" -o PreferredAuthentications=password,keyboard-interactive -o PubkeyAuthentication=no -p "${SERVER_PORT}" "$@"
          else
            ssh "${SSH_OPTIONS[@]}" -i "$HOME/.ssh/skit_deploy_key" -p "${SERVER_PORT}" "$@"
          fi
          EOF
          cat > .deploy/scp <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          # shellcheck disable=SC1091
          . "$(dirname "$0")/ssh-auth.env"
          SERVER_PORT="${SERVER_PORT:-22}"
          SCP_OPTIONS=(
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=60
            -o TCPKeepAlive=yes
            -o ConnectTimeout=30
          )
          if [ "${SKIT_AUTH_MODE}" = "password" ]; then
            SSHPASS="${SKIT_SSH_PASSWORD}" sshpass -e scp "${SCP_OPTIONS[@]}" -o PreferredAuthentications=password,keyboard-interactive -o PubkeyAuthentication=no -P "${SERVER_PORT}" "$@"
          else
            scp "${SCP_OPTIONS[@]}" -i "$HOME/.ssh/skit_deploy_key" -P "${SERVER_PORT}" "$@"
          fi
          EOF
          chmod +x .deploy/ssh .deploy/scp
          if [ "${SERVER_PORT}" != "22" ]; then
            echo "::error::The pinned production SSH host key currently authorizes port 22 only."
            exit 1
          fi
          install -m 600 deploy/known_hosts ~/.ssh/known_hosts
          ssh-keygen -F "${SERVER_HOST}" -f ~/.ssh/known_hosts >/dev/null \
            || { echo "::error::SERVER_HOST is not present in deploy/known_hosts"; exit 1; }

      - name: Upload release bundle
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          : "${SERVER_USER:?Set SERVER_USER secret}"
          SERVER_PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-skit-saas}"
          RELEASE_BUNDLE_PATH="${DEPLOY_PATH}/releases/backend-${RELEASE_ID}"
          SSH_TARGET="${SERVER_USER}@${SERVER_HOST}"
          chmod +x .deploy/activate-backend.sh
          .deploy/ssh "${SSH_TARGET}" \
            "mkdir -p '${DEPLOY_PATH}/releases' && mkdir -- '${RELEASE_BUNDLE_PATH}'"
          .deploy/scp \
            ".deploy/docker-compose.prod.yml" \
            ".deploy/activate-backend.sh" \
            ".deploy/cleanup-backend-release-env.sh" \
            "${SSH_TARGET}:${RELEASE_BUNDLE_PATH}/"
          .deploy/scp \
            ".deploy/ruoyi-vue-pro.sql" \
            ".deploy/skit-saas.sql" \
            ".deploy/quartz.sql" \
            "${SSH_TARGET}:${RELEASE_BUNDLE_PATH}/"

      - name: Activate backend on server
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          BACKEND_HEALTH_PATH: ${{ secrets.BACKEND_HEALTH_PATH }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          SKIT_AD_CALLBACK_PUBLIC_BASE_URL: ${{ vars.SKIT_AD_CALLBACK_PUBLIC_BASE_URL }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_SUDO_PASSWORD: ${{ secrets.SERVER_SUDO_PASSWORD }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -euo pipefail
          trap 'rm -f .deploy/server.env' EXIT
          SERVER_PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-skit-saas}"
          RELEASE_BUNDLE_PATH="${DEPLOY_PATH}/releases/backend-${RELEASE_ID}"
          SSH_TARGET="${SERVER_USER}@${SERVER_HOST}"
          SUDO_PASSWORD="${SERVER_SUDO_PASSWORD:-${SERVER_PASSWORD:-}}"
          install -m 600 /dev/null .deploy/server.env
          {
            if [ -n "${MYSQL_ROOT_PASSWORD}" ]; then
              printf 'MYSQL_ROOT_PASSWORD=%q\n' "${MYSQL_ROOT_PASSWORD}"
            fi
            printf 'MYSQL_DATABASE=%q\n' "${MYSQL_DATABASE:-skit_saas}"
            printf 'MYSQL_PORT=%q\n' "${MYSQL_PORT:-3306}"
            printf 'REDIS_PORT=%q\n' "${REDIS_PORT:-6379}"
            printf 'BACKEND_PORT=%q\n' "${BACKEND_PORT:-48080}"
            printf 'BACKEND_HEALTH_PATH=%q\n' "${BACKEND_HEALTH_PATH:-/actuator/health}"
            printf 'FRONTEND_PORT=%q\n' "${FRONTEND_PORT:-80}"
            if [ -z "${SKIT_AD_CALLBACK_PUBLIC_BASE_URL}" ]; then
              if [ "${FRONTEND_PORT:-80}" = "80" ]; then
                SKIT_AD_CALLBACK_PUBLIC_BASE_URL="http://${SERVER_HOST}/app-api"
              else
                SKIT_AD_CALLBACK_PUBLIC_BASE_URL="http://${SERVER_HOST}:${FRONTEND_PORT}/app-api"
              fi
            fi
            printf 'SKIT_AD_CALLBACK_PUBLIC_BASE_URL=%q\n' "${SKIT_AD_CALLBACK_PUBLIC_BASE_URL%/}"
            printf 'GHCR_USERNAME=%q\n' "${GHCR_USERNAME}"
            printf 'GHCR_TOKEN=%q\n' "${GHCR_TOKEN}"
            printf 'SUDO_PASSWORD=%q\n' "${SUDO_PASSWORD}"
          } > .deploy/server.env
          chmod 600 .deploy/server.env
          .deploy/scp \
            ".deploy/server.env" \
            "${SSH_TARGET}:${RELEASE_BUNDLE_PATH}/server.env"
          printf -v DEPLOY_PATH_Q '%q' "${DEPLOY_PATH}"
          printf -v RELEASE_ID_Q '%q' "${RELEASE_ID}"
          printf -v RELEASE_BUNDLE_PATH_Q '%q' "${RELEASE_BUNDLE_PATH}"
          printf -v IMAGE_NAME_Q '%q' "${IMAGE_NAME}"
          printf -v IMAGE_TAG_Q '%q' "${IMAGE_TAG}"
          .deploy/ssh "${SSH_TARGET}" \
            "DEPLOY_PATH=${DEPLOY_PATH_Q} RELEASE_ID=${RELEASE_ID_Q} RELEASE_BUNDLE_PATH=${RELEASE_BUNDLE_PATH_Q} IMAGE_NAME=${IMAGE_NAME_Q} IMAGE_TAG=${IMAGE_TAG_Q} bash -s" <<'REMOTE'
          set -euo pipefail
          remote_server_env_file="${RELEASE_BUNDLE_PATH}/server.env"
          remote_activation_script="${RELEASE_BUNDLE_PATH}/activate-backend.sh"
          remote_cleanup_script="${RELEASE_BUNDLE_PATH}/cleanup-backend-release-env.sh"
          cleanup_remote_server_env() {
            cleanup_status="${1:-0}"
            trap - EXIT HUP INT TERM
            DEPLOY_PATH="${DEPLOY_PATH}" RELEASE_ID="${RELEASE_ID}" \
              bash "${remote_cleanup_script}" || true
            exit "${cleanup_status}"
          }
          trap 'cleanup_remote_server_env $?' EXIT
          trap 'cleanup_remote_server_env 129' HUP
          trap 'cleanup_remote_server_env 130' INT
          trap 'cleanup_remote_server_env 143' TERM
          chmod 600 -- "${remote_server_env_file}"
          chmod +x -- "${remote_activation_script}"
          DEPLOY_PATH="${DEPLOY_PATH}" \
            RELEASE_BUNDLE_PATH="releases/backend-${RELEASE_ID}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            IMAGE_TAG="${IMAGE_TAG}" \
            "${remote_activation_script}"
          REMOTE

      - name: Remove staged backend server environment
        if: always() && steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          if [ ! -x .deploy/ssh ]; then
            echo "::notice::Remote server.env cleanup skipped because SSH setup did not complete."
            exit 0
          fi
          : "${SERVER_USER:?Set SERVER_USER secret}"
          SERVER_PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-skit-saas}"
          RELEASE_BUNDLE_PATH="${DEPLOY_PATH}/releases/backend-${RELEASE_ID}"
          REMOTE_CLEANUP_SCRIPT="${RELEASE_BUNDLE_PATH}/cleanup-backend-release-env.sh"
          SSH_TARGET="${SERVER_USER}@${SERVER_HOST}"
          printf -v DEPLOY_PATH_Q '%q' "${DEPLOY_PATH}"
          printf -v RELEASE_ID_Q '%q' "${RELEASE_ID}"
          printf -v REMOTE_CLEANUP_SCRIPT_Q '%q' "${REMOTE_CLEANUP_SCRIPT}"
          .deploy/ssh "${SSH_TARGET}" \
            "DEPLOY_PATH=${DEPLOY_PATH_Q} RELEASE_ID=${RELEASE_ID_Q} bash ${REMOTE_CLEANUP_SCRIPT_Q}"
