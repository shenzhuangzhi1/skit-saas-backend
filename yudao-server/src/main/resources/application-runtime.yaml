# Shared server runtime for container deployments. Keep this profile limited to infrastructure
# required by the application itself; local demo accounts and third-party test integrations belong
# only in application-local.yaml and must never be inherited by production.
server:
  port: 48080

spring:
  autoconfigure:
    exclude:
      - com.alibaba.druid.spring.boot.autoconfigure.DruidDataSourceAutoConfigure
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration
      - org.springframework.ai.vectorstore.milvus.autoconfigure.MilvusVectorStoreAutoConfiguration
      # Global WxJava clients are not tenant-safe and also require credentials at startup. Tenant
      # integrations are built lazily from system_social_client by SocialClientServiceImpl.
      - com.binarywang.spring.starter.wxjava.mp.config.WxMpAutoConfiguration
      - com.binarywang.spring.starter.wxjava.miniapp.config.WxMaAutoConfiguration
  datasource:
    dynamic:
      primary: master
      druid:
        initial-size: 1
        min-idle: 1
        max-active: 20
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 600000
        max-evictable-idle-time-millis: 1800000
        validation-query: SELECT 1
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
      datasource:
        master:
          url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_SERVICE_PORT:3306}/${MYSQL_DATABASE:skit_saas}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: ${MYSQL_USERNAME:root}
          password: ${MYSQL_PASSWORD}
        slave:
          lazy: true
          url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_SERVICE_PORT:3306}/${MYSQL_DATABASE:skit_saas}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: ${MYSQL_USERNAME:root}
          password: ${MYSQL_PASSWORD}
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
  quartz:
    auto-startup: true
    scheduler-name: skitSaasScheduler
    job-store-type: jdbc
    wait-for-jobs-to-complete-on-shutdown: true
    jdbc:
      initialize-schema: NEVER
    properties:
      org:
        quartz:
          scheduler:
            instanceName: skitSaasScheduler
            instanceId: AUTO
          jobStore:
            class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
            isClustered: true
            clusterCheckinInterval: 15000
            misfireThreshold: 60000
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 10
            threadPriority: 5

logging:
  file:
    name: ${LOG_FILE:${user.home}/logs/${spring.application.name}.log}
  level:
    cn:
      iocoder:
        yudao:
          module: INFO
    com:
      baomidou:
        mybatisplus: INFO
    org:
      apache:
        ibatis: INFO
      mybatis: INFO

# Keep the optional WxJava starters on the project's HttpClient 5 / shared Redis path even when
# production does not configure WeChat credentials. Without this neutral wiring the starters fall
# back to their in-memory storage, whose initializer hard-loads the intentionally absent
# HttpClient 4 TrustStrategy class and prevents the whole server from starting.
wx:
  mp:
    config-storage:
      type: RedisTemplate
      key-prefix: wx
      http-client-type: HttpComponents
  miniapp:
    config-storage:
      type: RedisTemplate
      key-prefix: wa
      http-client-type: HttpComponents
